<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - OncoScan AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/frontend/admin/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>Analytical Statistics</h1>
        <button onclick="location.href='/admin'">Back to Dashboard</button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
        <div class="chart-container">
            <h3 style="margin-bottom: 20px; color: var(--text-secondary);">Prediction Distribution</h3>
            <div style="max-width: 300px; margin: 0 auto;">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <h3 style="margin-bottom: 20px; color: var(--text-secondary);">Daily Prediction Activity</h3>
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <footer class="footer" style="text-align: center; padding: 40px 0; color: var(--text-secondary); font-size: 0.875rem;">
        <p>&copy; 2026 OncoScan AI. All rights reserved.</p>
        <p style="margin-top: 10px;">Developed by <a href="https://github.com/Masud744" target="_blank" style="color: #3b82f6; text-decoration: none; font-weight: 600; border-bottom: 2px solid transparent; transition: border-color 0.2s;" onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor='transparent'">Shahriar Alom Masud</a></p>
    </footer>
</div>
<script src="/frontend/config.js"></script>
<script src="/frontend/admin/stats.js"></script>
</body>
</html>
